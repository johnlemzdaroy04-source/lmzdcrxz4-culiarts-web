<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Culinary Arts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="recipes.html">Recipes</a></li>
                <li><a href="qa.html">Q&A</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div class="dashboard">
            <h1>Your Progress Dashboard</h1>
            <div class="user-info">
                <h2 id="userName"></h2>
                <p id="userLevel"></p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Recipes Completed</h3>
                    <p id="recipesCompleted" class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>Learning Streak</h3>
                    <p id="streak" class="stat-number">0 days</p>
                </div>
                <div class="stat-card">
                    <h3>Bookmarked Recipes</h3>
                    <p id="bookmarked" class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>Q&A Posts</h3>
                    <p id="qaCount" class="stat-number">0</p>
                </div>
            </div>

            <div class="achievements">
                <h3>Achievements</h3>
                <div id="achievementsList"></div>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Culinary Arts Platform</p>
    </footer>
    <script src="auth.js"></script>
    <script src="progress.js"></script>
    <script src="main.js"></script>
</body>
</html>
