<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Forum - Culinary Arts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="recipes.html">Recipes</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div class="qa-page">
            <h1>Community Q&A Forum</h1>
            
            <div class="post-form">
                <h3>Ask a Question</h3>
                <form id="postForm">
                    <input type="text" id="postTitle" placeholder="Question Title" required>
                    <textarea id="postContent" placeholder="Describe your question..." required rows="4"></textarea>
                    <button type="submit">Post Question</button>
                </form>
            </div>

            <div class="qa-container">
                <h3>Recent Questions</h3>
                <div id="qaList"></div>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Culinary Arts Platform</p>
    </footer>
    <script src="auth.js"></script>
    <script src="qa.js"></script>
    <script src="main.js"></script>
</body>
</html>
